  - name: AIInnovationLab
    type: Features
    description: >-
      ELC AI Innovation Lab and adjacent generative AI partnerships. ELC has
      no public AI/ML API surface; these are enterprise initiatives.
    data:
      - initiative: AI Innovation Lab (Microsoft Azure OpenAI)
        partner: Microsoft
        announced: '2024-04-26'
        scope: >-
          Expands an ELC + Microsoft relationship in place since 2017.
          Leverages "cutting-edge generative AI capabilities in Microsoft
          Azure OpenAI Service" to build a global marketing chatbot tied to
          ELC's proprietary product and claim database, plus generative AI
          tools accelerating R&D ingredient and trend response, and the
          previously launched Voice-Enabled Makeup Assistant (VMA) mobile
          app (iOS/Android — US/UK/Ireland) for visually impaired users.
        executive: Jane Lauder (then EVP Enterprise Marketing and Chief Data Officer)
      - initiative: ConsumerIQ
        partner: Microsoft
        announced: '2025-04-29'
        scope: >-
          Chat-based natural-language tool built on Microsoft Copilot Studio
          and Azure OpenAI Service that unifies ELC's consumer, market and
          industry data (PDFs, decks, spreadsheets) across 25 brands and
          150 countries, reducing data-gathering time from weeks to minutes.
          ELC named to Microsoft's inaugural "Agents of Change" list, March
          2025.
      - initiative: Adobe Firefly Services
        partner: Adobe
        announced: '2025-03-12'
        scope: >-
          Adobe Firefly Services APIs, Generative Expand, and Adobe
          Experience Manager Assets as Cloud Service to scale production of
          hundreds of thousands of digital marketing assets per year across
          ~25 brands in ~150 countries. M·A·C Cosmetics is the pilot brand.
      - initiative: Jo Malone London AI Scent Advisor
        partner: Google Cloud
        announced: '2025-12-02'
        scope: >-
          Conversational fragrance discovery experience on JoMalone.com
          (US/UK) powered by Google Gemini and Google Cloud Vertex AI,
          mapping natural-language preferences to Jo Malone's olfactory
          data attributes.
      - initiative: Shopify global DTC commerce platform
        partner: Shopify
        announced: '2025-10-28'
        scope: >-
          Strategic platform shift to a unified omnichannel commerce stack
          on Shopify with real-time data and AI-driven capabilities. First
          phase launched Q1 2026 (calendar year); ~50% of the rollout
          expected by calendar year-end 2026 per the April 2026 PRGP update.
      - initiative: Accenture Enterprise Business Services
        partner: Accenture
        announced: '2026-04-01'
        scope: >-
          Standardization of shared services within the One ELC operating
          model.
      - initiative: WPP global media partnership
        partner: WPP
        announced: '2026-04-01'
        scope: >-
          First-ever unified global media partner, consolidating
          historically decentralized regional media operations.
  - name: StrategicTransformation
    type: Features
    description: >-
      Beauty Reimagined strategic vision and Profit Recovery and Growth
      Plan (PRGP) anchoring ELC's 2024–2027 transformation under CEO
      Stéphane de La Faverie.
    data:
      - program: Beauty Reimagined
        announced: '2025-02'
        description: >-
          Strategic vision for restoring sustainable sales growth and
          double-digit adjusted operating margins via a leaner, faster,
          more agile operating model with expanded consumer coverage.
      - program: Profit Recovery and Growth Plan (PRGP)
        scope: >-
          Restructuring program targeting the upper range of $0.8–$1.0
          billion gross benefits, with estimated restructuring charges of
          $1.2–$1.6 billion; majority of full run-rate benefits expected in
          fiscal 2027.
      - program: One ELC Operating Model
        components: One Team (July 2025), One Culture (February 2026), One Operating Ecosystem (2026)
        ceoQuote: >-
          "One ELC operating model is now fully established. This unified
          system will enable faster, more agile and efficient operations
          supporting growth." — Stéphane de La Faverie, April 2026
