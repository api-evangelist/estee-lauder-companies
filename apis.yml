aid: estee-lauder-companies
name: The Estée Lauder Companies
description: >-
  The Estée Lauder Companies Inc. (NYSE: EL) is one of the world's leading
  manufacturers, marketers and sellers of quality prestige skin care, makeup,
  fragrance and hair care products. Founded in 1946 by Estée and Joseph Lauder,
  the family-controlled, New York-headquartered conglomerate operates a
  portfolio of more than 20 prestige brands sold in approximately 150
  countries and territories, employs roughly 57,000 people worldwide, and
  reported fiscal 2025 net sales of approximately $14.32 billion.
  ELC's corporate website (elcompanies.com) does not expose any public
  developer APIs, OpenAPI specs, SDKs, sandboxes, or a developer portal — the
  EsteeLauder GitHub organization is empty of public repositories. The
  technology surface is instead expressed through enterprise partnerships:
  the AI Innovation Lab (announced 2023, expanded April 2024) jointly run
  with Microsoft on Azure OpenAI Service; the ConsumerIQ tool built on
  Microsoft Copilot Studio (2025); an Adobe Firefly Services generative AI
  collaboration for digital marketing assets (March 2025); a Google
  Gemini / Vertex AI–powered Jo Malone London Scent Advisor (December
  2025); and a Shopify-based unified global direct-to-consumer commerce
  platform (announced October 2025, ~50% rolled out by calendar year-end
  2026). ELC's strategic vision, "Beauty Reimagined" (announced February
  2025), and the Profit Recovery and Growth Plan ($0.8–1.0B gross benefits;
  $1.2–1.6B restructuring charges) anchor the One ELC operating model now
  led by CEO Stéphane de La Faverie and Board Chair William P. Lauder.
