name: The Estée Lauder Companies Vocabulary
description: >-
  Domain vocabulary covering The Estée Lauder Companies (ELC) — a global
  prestige beauty conglomerate (NYSE: EL) — its brand portfolio, product
  categories, transformation programs, and AI / technology partnerships.
  ELC publishes no public APIs, so this vocabulary frames the corporate
  and program surface rather than a developer surface.
url: >-
  https://raw.githubusercontent.com/api-evangelist/estee-lauder-companies/refs/heads/main/vocabulary/estee-lauder-companies-vocabulary.yml
created: '2026-05-23'
modified: '2026-05-23'

corporate:
  - term: The Estée Lauder Companies Inc.
    abbreviation: ELC
    definition: >-
      Family-controlled, publicly traded (NYSE: EL) prestige beauty
      conglomerate headquartered in New York City, founded in 1946 by Estée
      and Joseph Lauder.
  - term: Lauder family
    definition: >-
      Founding family retaining ownership and governance influence across
      three generations; represented today by Board Chair William P. Lauder,
      Aerin Lauder (AERIN Beauty founder/creative director), Jane Lauder,
      and Gary M. Lauder.
  - term: NYSE EL
    definition: New York Stock Exchange ticker for The Estée Lauder Companies Inc.

leadership:
  - role: Chief Executive Officer
    name: Stéphane de La Faverie
  - role: Chair of the Board
    name: William P. Lauder
  - role: Chief Technology Officer
    name: Brian Franz
  - role: Founder, Creative Director — AERIN Beauty
    name: Aerin Lauder

categories:
  - term: Skin Care
    definition: Cleansers, serums, moisturizers, treatments; ELC's largest segment.
  - term: Makeup
    definition: Color cosmetics for face, eyes, lips.
  - term: Fragrance
    definition: Prestige and luxury fragrances; designated a key growth driver.
  - term: Hair Care
    definition: Cleansing, conditioning, styling, and treatment hair products.
  - term: Prestige Beauty
    definition: >-
      Premium-tier beauty positioning emphasizing efficacy, brand heritage,
      retail experience, and price point above mass channels.

