programs:
  - term: Beauty Reimagined
    type: Strategic Vision
    announced: '2025-02'
    definition: >-
      Multi-year strategic vision aimed at restoring sustainable sales
      growth and double-digit adjusted operating margins through a leaner,
      faster, more agile operating model and expanded consumer coverage.
  - term: Profit Recovery and Growth Plan
    abbreviation: PRGP
    definition: >-
      Restructuring program targeting the upper range of $0.8–$1.0 billion
      in gross benefits; estimated restructuring charges of $1.2–$1.6
      billion. Majority of full run-rate benefits expected in fiscal 2027.
  - term: One ELC
    definition: >-
      Operating model with three pillars — One Team (July 2025), One Culture
      (February 2026), and One Operating Ecosystem (2026) — reducing
      hierarchical layers and unifying platforms and partnerships.
  - term: Enterprise Business Services
    partner: Accenture
    definition: Standardized shared services within the One ELC operating ecosystem.

ai_technology:
  - term: AI Innovation Lab
    partner: Microsoft
    definition: >-
      Joint generative AI capability announced April 26, 2024 expanding an
      ELC + Microsoft relationship in place since 2017, built on Microsoft
      Azure OpenAI Service to power marketing chatbots and R&D acceleration.
  - term: ConsumerIQ
    partner: Microsoft
    definition: >-
      Chat-based natural-language insight tool launched April 29, 2025 on
      Microsoft Copilot Studio + Azure OpenAI Service, unifying ELC's
      consumer/market/industry data across 25 brands and 150 countries.
  - term: Voice-Enabled Makeup Assistant
    abbreviation: VMA
    definition: >-
      ELC accessibility app (iOS/Android — US/UK/Ireland) launched early
      2023 for visually impaired makeup users, later integrated into the
      Microsoft generative AI work.
  - term: Adobe Firefly Services
    partner: Adobe
    definition: >-
      Generative AI APIs + Adobe Experience Manager Assets as Cloud Service
      adopted March 12, 2025 to scale digital marketing content production;
      M·A·C is the pilot brand.
  - term: Jo Malone London Scent Advisor
    partner: Google Cloud
    definition: >-
      Conversational fragrance discovery tool on JoMalone.com (US/UK)
      launched December 2, 2025, powered by Google Gemini and Vertex AI.
  - term: Shopify global commerce platform
    partner: Shopify
    definition: >-
      Strategic platform shift announced October 28, 2025 to a unified
      omnichannel commerce stack on Shopify; ~50% of the global rollout
      expected by calendar year-end 2026.
  - term: WPP global media partnership
    partner: WPP
    definition: First-ever unified global media partner, announced April 2026.

